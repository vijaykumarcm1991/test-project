version: '3.8'

services:
  # Frontend - React with Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:5000/api
    depends_on:
      - backend
    networks:
      - weather-network
    restart: unless-stopped

  # Backend - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - WEATHER_API_KEY=${WEATHER_API_KEY:-demo}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://weatheruser:weatherpass@postgres:5432/weatherdb
    depends_on:
      - redis
      - postgres
    networks:
      - weather-network
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - backend_data:/app/data

  # Redis - Caching layer
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - weather-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # PostgreSQL - Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: weatheruser
      POSTGRES_PASSWORD: weatherpass
      POSTGRES_DB: weatherdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - weather-network
    restart: unless-stopped

  # Nginx - Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - weather-network
    restart: unless-stopped
    profiles:
      - production

networks:
  weather-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  backend_data:
